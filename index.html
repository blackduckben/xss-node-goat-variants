<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>postMessage XSS</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }
        .container { padding: 1rem; }
        input { padding: 0.5rem; font-size: 1rem; width: 80%; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #output {
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            min-height: 2rem;
            background: #f9f9f9;
        }
        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>postMessage XSS</h1>

        <div class="hint">
            <strong>Open browser console and run:</strong>
            <code>window.postMessage("&lt;img src=x onerror=alert('postMessage XSS')&gt;", "*")</code>
        </div>

        <p>Receiving messages from other windows/iframes...</p>
        <div id="message-display" style="border: 1px solid #ccc; padding: 1rem; margin-top: 1rem; min-height: 2rem;"></div>
    </div>

    <script>
        // VULNERABLE: postMessage handler with no origin validation and unsafe innerHTML
        // Accepts any message from any origin and renders to DOM

        window.addEventListener("message", function(event) {
            // VULNERABLE: No origin validation (should check event.origin)
            // VULNERABLE: Rendering untrusted message data directly to innerHTML
            const messageContent = event.data;
            document.getElementById("message-display").innerHTML = messageContent;

            console.log("Received message:", messageContent);
        });

        // Safe version would be:
        // if (event.origin !== "https://trusted-domain.com") return;
        // And should escape the content or use textContent instead of innerHTML
    </script>
</body>
</html>
