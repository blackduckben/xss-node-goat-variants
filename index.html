<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Template Literal XSS (tuned: location.hash source)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }
        .container { padding: 1rem; }
        #results {
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            min-height: 2rem;
            background: #f9f9f9;
        }
        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Template Literal XSS (tuned)</h1>

        <div class="hint">
            <strong>Try this in the URL:</strong>
            <code>#&lt;img src=x onerror=alert('Template Literal XSS')&gt;</code>
            <br>The search term is read from <code>location.hash</code> (e.g. a
            shareable "deep link" to a search) and rendered on load / hashchange.
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Mock user database
        const users = [
            { id: 1, name: "Alice" },
            { id: 2, name: "Bob" },
            { id: 3, name: "Charlie" }
        ];

        function searchUsers() {
            // TUNED: search term sourced from location.hash (a recognized
            // DOM-XSS taint source) instead of an in-page form field's .value
            const searchTerm = decodeURIComponent(location.hash.slice(1));
            const results = users.filter(u => u.name.toLowerCase().includes(searchTerm.toLowerCase()));

            // SINK unchanged from the base branch: template literal -> innerHTML
            const html = `
                <h3>Search results for "${searchTerm}":</h3>
                ${results.map(user => `<p><strong>${user.name}</strong> (ID: ${user.id})</p>`).join("")}
            `;

            document.getElementById("results").innerHTML = html;
        }

        window.addEventListener("load", searchUsers);
        window.addEventListener("hashchange", searchUsers);
    </script>
</body>
</html>
