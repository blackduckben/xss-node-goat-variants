    <script>
        function createButton() {
            // TUNED: button label sourced from location.hash (a recognized

            // SINK unchanged from the base branch: unsanitized interpolation

            const html = `<button title="${userText}">Custom Button</button>`;

            document.getElementById("container").innerHTML = html;

        // Exploit fragment: #" onmouseover="alert('XSS')
        // Result: <button title="" onmouseover="alert('XSS')">Custom Button</button>
        window.addEventListener("load", createButton);
        window.addEventListener("hashchange", createButton);
