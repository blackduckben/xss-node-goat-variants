<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>URL Parameter Reflected XSS</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }
        .container { padding: 1rem; }
        input { padding: 0.5rem; font-size: 1rem; width: 80%; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #output {
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            min-height: 2rem;
            background: #f9f9f9;
        }
        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Parameter Reflected XSS</h1>

        <div class="hint">
            <strong>Try this in the URL:</strong>
            <code>?name=&lt;img src=x onerror=alert('Reflected XSS')&gt;</code>
            <br>Copy the link below, edit the query param, and visit it
        </div>

        <p id="greeting"></p>
        <p id="link-copy"></p>
    </div>

    <script>
        // VULNERABLE: Reflected XSS from URL parameter
        // No sanitization of query string parameters before rendering to DOM

        function init() {
            const params = new URLSearchParams(window.location.search);
            const name = params.get("name") || "Guest";

            // Directly inserting URL parameter into innerHTML
            document.getElementById("greeting").innerHTML = `Hello, ${name}!`;

            // Generate a shareable link
            const currentUrl = window.location.href;
            document.getElementById("link-copy").innerHTML =
                `<strong>Current link:</strong><br><code>${currentUrl}</code>`;
        }

        // Run on page load
        window.addEventListener("load", init);
    </script>
</body>
</html>
