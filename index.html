<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Template Literal XSS</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }
        .container { padding: 1rem; }
        input { padding: 0.5rem; font-size: 1rem; width: 80%; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #output {
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            min-height: 2rem;
            background: #f9f9f9;
        }
        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Template Literal XSS</h1>

        <div class="hint">
            <strong>Try this:</strong>
            <code>&lt;img src=x onerror=alert('Template Literal XSS')&gt;</code>
        </div>

        <label for="input">Search users by name:</label>
        <br><br>
        <input id="input" type="text" placeholder="Type a name...">
        <button onclick="searchUsers()">Search</button>

        <div id="results"></div>
    </div>

    <script>
        // Mock user database
        const users = [
            { id: 1, name: "Alice" },
            { id: 2, name: "Bob" },
            { id: 3, name: "Charlie" }
        ];

        function searchUsers() {
            const searchTerm = document.getElementById("input").value;
            const results = users.filter(u => u.name.toLowerCase().includes(searchTerm.toLowerCase()));

            // VULNERABLE: Building HTML via template literal with unsanitized user input
            // String interpolation in backticks, then inserted via innerHTML
            const html = `
                <h3>Search results for "${searchTerm}":</h3>
                ${results.map(user => `<p><strong>${user.name}</strong> (ID: ${user.id})</p>`).join("")}
            `;

            document.getElementById("results").innerHTML = html;
        }

        document.getElementById("input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchUsers();
        });
    </script>
</body>
</html>
