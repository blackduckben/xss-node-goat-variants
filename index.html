<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>jQuery-based XSS</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }
        .container { padding: 1rem; }
        input { padding: 0.5rem; font-size: 1rem; width: 80%; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #output {
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            min-height: 2rem;
            background: #f9f9f9;
        }
        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>jQuery-based XSS</h1>

        <div class="hint">
            <strong>Try this:</strong>
            <code>&lt;img src=x onerror=alert('jQuery XSS')&gt;</code>
        </div>

        <label for="input">Comment (jQuery .html()):</label>
        <br><br>
        <input id="input" type="text" placeholder="Type something...">
        <button onclick="renderComment()">Post</button>

        <div id="comments"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function renderComment() {
            const userComment = document.getElementById("input").value;

            // VULNERABLE: jQuery .html() with unsanitized user input
            // Same issue as innerHTML but via jQuery
            $("#comments").html(userComment);

            document.getElementById("input").value = "";
        }

        document.getElementById("input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") renderComment();
        });
    </script>
</body>
</html>
