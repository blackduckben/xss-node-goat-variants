<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>DOM-based XSS (tuned: location.hash source)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; }
        .container { padding: 1rem; }
        button { padding: 0.5rem 1rem; cursor: pointer; }
        #output {
            border: 2px solid #ddd;
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
            min-height: 2rem;
            background: #f9f9f9;
        }
        .hint {
            background: #fff8e1;
            border: 1px solid #ffe082;
            padding: 0.75rem;
            border-radius: 6px;
            margin: 1rem 0;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DOM-based XSS (tuned)</h1>

        <div class="hint">
            <strong>Try this in the URL:</strong>
            <code>#&lt;img src=x onerror=alert('XSS from ' + document.domain)&gt;</code>
            <br>The fragment after <code>#</code> is read from <code>location.hash</code>
            and rendered on load / hashchange.
        </div>

        <div id="output"></div>
    </div>

    <script>
        function render() {
            // TUNED: source is location.hash (a recognized DOM-XSS taint source)
            // instead of an in-page form field's .value
            const userInput = decodeURIComponent(location.hash.slice(1));

            // SINK unchanged from the base branch: direct innerHTML assignment
            document.getElementById("output").innerHTML = userInput;
        }

        window.addEventListener("load", render);
        window.addEventListener("hashchange", render);
    </script>
</body>
</html>
